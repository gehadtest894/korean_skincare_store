            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);/*علشان يحطلى ظل خفيف للعنوان*/
        }

        nav a {/*تنسيق روابط القائمه*/

            text-decoration: none;/*بيشيل الخط اللى موجود تحت اللينك*/

        }

        .hero {

        .product-card img {

}

    border-radius: 5px;
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s;
}

.add-to-cart:hover {

</head>

    <script>
    function addToCart(productName) {
        // 1.  علشان المستخدم يدخل اسمه 
        let userName = prompt(" Please Enter Your Name To Complete The order"     );
        
        // لو المستخدم داس Cancel أو ساب الخانة فاضية
        if (userName == null || userName == "") {
            alert(" Name Must be entered");
            return;
        }

        // 2. دخل رقم التليفون
        let userPhone = prompt("Please Enter your Phone Number");
        
        if (userPhone == null || userPhone == "") {
            alert("Phone Number Must be entered");
            return;
        }

        // 3. الرساله اللى هتظهر بعد ما المستخدم يدخل بيانته لتاكيد الطلب
        alert("Hello " + userName + "!\n(" + productName + ") has been successfully added to your cart. ✨\nWe will contact you at: " + userPhone);
    }
</script>
